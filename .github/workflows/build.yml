name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -sf /opt/gradle-8.6/bin/gradle /usr/local/bin/gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CloudVNC-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: build-${{ github.run_number }}
          name: "Cloud VNC - Build ${{ github.run_number }}"
          body: |
            ## ☁ Cloud VNC APK
            ### التثبيت:
            حمّل الـ APK → Settings → Allow unknown sources → ثبّت

            ### الاتصال:
            1. شغّل `android-cloud` من [هنا](https://github.com/jassermalo/android-cloud/actions)
            2. انتظر ظهور `bore.pub:XXXXX` في الـ logs
            3. أدخله في التطبيق

            ### التحكم باللمس:
            | اللمس | الفعل |
            |---|---|
            | نقرة واحدة | كليك يسار |
            | سحب | تحريك المؤشر |
            | ضغط طويل | كليك يمين |
            | أصبعين | تحريك الشاشة |
            | قرصة | تكبير/تصغير |
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
