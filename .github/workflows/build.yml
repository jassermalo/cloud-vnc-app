name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -sf /opt/gradle-8.6/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" -Dandroid.overrideVersionCheck=true
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CloudVNC-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v${{ github.run_number }}
          name: "Cloud VNC v${{ github.run_number }}"
          body: |
            ## ☁ Cloud VNC - Fast Android VNC with Touch
            ### كيفية الاستخدام:
            1. حمّل الـ APK وثبّته
            2. شغّل android-cloud من GitHub Actions
            3. انسخ عنوان bore.pub:PORT
            4. أدخله في التطبيق واضغط اتصال
            ### المميزات:
            - لمس سريع (tap, drag, pinch-zoom)
            - ضغط طويل = كليك يمين
            - تاريخ الاتصالات
            - وضع ملء الشاشة
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
